name: Release SDK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check public exposure guard
        run: pnpm check:public-exposure

      - name: Check publish allowlist
        run: pnpm check:publish-allowlist

      - name: Build workspace packages
        run: pnpm build --filter "@hua-labs/*"

      - name: Refresh verified empty release snapshot
        run: pnpm safe-release:refresh

      - name: Create or update version PR without npm credentials
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm safe-release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate durable exact release plan
        id: release-plan
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: node scripts/safe-release.mjs check --format=github --allow-empty >> "$GITHUB_OUTPUT"

      - name: Create .npmrc for authorized nonempty release
        if: steps.release-plan.outputs.publish == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          umask 077
          for npmrc in "$HOME/.npmrc" .npmrc; do
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$npmrc"
            echo "access=public" >> "$npmrc"
            echo "registry=https://registry.npmjs.org/" >> "$npmrc"
            echo "provenance=true" >> "$npmrc"
          done

      - name: Verify publish provenance config
        if: steps.release-plan.outputs.publish == 'true'
        env:
          NPM_CONFIG_PROVENANCE: "true"
          PNPM_CONFIG_PROVENANCE: "true"
        run: |
          test "$(npm config get provenance)" = "true"
          test "$(pnpm config get provenance)" = "true"

      - name: Publish exact validated release plan
        id: safe-publish
        if: steps.release-plan.outputs.publish == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          PNPM_CONFIG_PROVENANCE: "true"
        run: |
          published="$RUNNER_TEMP/hua-published-packages.json"
          pnpm safe-release:publish > "$published"
          test -s "$published"
          echo "published_path=$published" >> "$GITHUB_OUTPUT"

      - name: Check exact published-set npm provenance
        if: steps.release-plan.outputs.publish == 'true'
        run: pnpm check:npm-provenance -- --published "${{ steps.safe-publish.outputs.published_path }}"

      - name: Close exact published plan to an empty snapshot
        if: steps.release-plan.outputs.publish == 'true'
        run: |
          pnpm safe-release:close --published "${{ steps.safe-publish.outputs.published_path }}"
          node scripts/safe-release.mjs check --format=github --allow-empty
