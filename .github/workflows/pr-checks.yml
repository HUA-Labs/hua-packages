name: PR Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '24'

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install build tools for native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Validate workspace registry
        run: node --experimental-strip-types scripts/check-workspace-registry.ts

      - name: Build packages
        run: pnpm workspace:build:packages

      - name: Type check
        run: pnpm workspace:type-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install build tools for native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Validate workspace registry
        run: node --experimental-strip-types scripts/check-workspace-registry.ts

      - name: Build packages
        run: pnpm workspace:build:packages

      - name: Lint
        run: pnpm workspace:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install build tools for native modules
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Validate workspace registry
        run: node --experimental-strip-types scripts/check-workspace-registry.ts

      - name: Build packages
        run: pnpm workspace:build:packages

      - name: Test
        run: pnpm workspace:test

  doc-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Validate docs are in sync
        run: pnpm generate:docs:validate
