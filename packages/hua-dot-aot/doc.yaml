overview: "Build-time static extraction for @hua-labs/dot. Replaces authorized static dot() calls with pre-computed style objects while leaving ambiguous or dynamic calls at runtime. Provides a parser-backed Vite transform and a Babel plugin for explicit Babel pipelines such as Metro. AOT output follows the @hua-labs/dot resolver and AX catalog; this package does not define independent capability truth."

features:
  - "Zero-runtime CSS — static dot() calls replaced with inline object literals at build time"
  - "Vite plugin — enforce: 'pre' transform hook with parser-backed call and import binding authority"
  - "Babel plugin — scope-aware CallExpression visitor for Metro and other explicit Babel pipelines"
  - "Exact import authority — transforms only named dot imports from @hua-labs/dot; foreign, local, namespace, type-only, and shadowed bindings stay runtime"
  - "Static options support — accepts only exact literal target and dark values; unknown, duplicate, computed, spread, nested, and dynamic options stay runtime"
  - "Lexical safety — strings, comments, templates, regex literals, JSX text, constructors, member calls, and malformed modules are never rewritten by text matching"
  - "Cross-platform output — correct serialization for web, native, and flutter targets"
  - "AX boundary — delegates capability truth to @hua-labs/dot/getDotAxCatalog() and preserves target output parity without creating an AOT-specific catalog"
  - "Graceful fallback — malformed or unresolvable calls silently left as runtime"
  - "styleToObjectLiteral — handles nested structures (RN transform arrays, Flutter recipe objects)"

quickStart: |
  // Vite
  import dotAot from "@hua-labs/dot-aot/vite";
  export default defineConfig({ plugins: [dotAot()] });

  // Babel / Metro (or another explicit Babel pipeline)
  module.exports = {
    plugins: [["@hua-labs/dot-aot/babel", { target: "native" }]],
  };

  // Application source (the exact import owns extraction authority):
  import { dot } from "@hua-labs/dot";
  const style = dot("p-4 flex items-center bg-primary-500");

  // Equivalent generated value:
  const generatedStyle = {
    padding: "16px",
    display: "flex",
    alignItems: "center",
    backgroundColor: "var(--color-primary-500)",
  };

readme:
  features:
    - "Build-time extraction for static dot() calls"
    - "Vite and Babel plugin entrypoints"
    - "Target-aware output parity with @hua-labs/dot"
    - "Dynamic or unsafe calls remain at runtime"
  quickStart: |
    import dotAot from '@hua-labs/dot-aot/vite';

    export default defineConfig({
      plugins: [dotAot()],
    });
  codeBlockLang: "ts"
  hideApi: true
  hideSections: true
  detailedGuide: "./DETAILED_GUIDE.md"

related:
  - "dot"

apiFilter: notes-only

apiNotes:
  extractStaticCalls:
    description: "Parse a source module and return authorized, statically extractable named dot-import calls sorted last-to-first. Options include functionNames and the web/native/flutter default target. Parse failures and ambiguous bindings fail closed."
  transformSource:
    description: "Apply parser-authorized extractions in one pass. Returns { code, extractions } or null if no changes. The source must contain an exact named dot import from @hua-labs/dot."
  styleToObjectLiteral:
    description: "Serialize a resolved style object to a JS object literal string (with wrapping parentheses). Handles nested arrays and objects for RN/Flutter targets."
  ExtractedCall:
    description: "Single extraction result: { start, end, input, options?, result }. start/end are character offsets in the source string."
    kind: type
  ExtractOptions:
    description: "Options for core extraction: functionNames is an allowlist of local names that must still alias the named @hua-labs/dot export; target supplies the default web/native/flutter output."
    kind: type
  DotAotViteOptions:
    description: "Vite plugin options — extends ExtractOptions with include (file extensions) and exclude (path patterns)."
    kind: type
  DotAotBabelOptions:
    description: "Babel plugin options — functionNames and target. The plugin verifies Babel's lexical binding resolves to the exact named @hua-labs/dot import."
    kind: type
  "@hua-labs/dot-aot/vite":
    description: "Default export: dotAotVite(options?) — returns a Vite Plugin. Logs extraction count in buildEnd hook."
    kind: function
  "@hua-labs/dot-aot/babel":
    description: "Default export: dotAotBabel(_babel, options?) — standard Babel plugin factory. Uses CallExpression AST visitor."
    kind: function

sections:
  - title: "AX Boundary"
    content: |
      `@hua-labs/dot-aot` is a build-time projection over `@hua-labs/dot`.
      It calls the real `dot()` resolver for static, extractable inputs and
      serializes that result into source code. Capability metadata remains owned
      by `@hua-labs/dot` and its `getDotAxCatalog()` export.

      AOT does not publish an independent AX catalog, target support matrix, or
      diagnostic source of truth. If a target property is unsupported,
      approximate, recipe-only, or plugin-backed, the runtime resolver and the
      package-owned dot AX catalog remain the authority. AOT should preserve
      target output parity and leave dynamic or unsafe calls at runtime rather
      than inventing alternate capability semantics.

  - title: "Binding And Parser Boundary"
    content: |
      AOT transformation is authorized by syntax and lexical ownership, not by
      a matching identifier string. The core/Vite path parses the module and
      the Babel path consults Babel bindings. Both require a runtime named
      `dot` import from `@hua-labs/dot`; configured aliases are admitted only
      when they are aliases of that exact export.

      Bare globals, local helpers, foreign packages, namespace/member access,
      type-only imports, constructors, and shadowed or ambiguous bindings stay
      at runtime. Only a string literal plus an optional flat object containing
      exact literal `target` and/or `dark` keys is extractable. Malformed source
      and every unsupported option shape fail closed without a partial textual
      rewrite. Only an absent or explicit `undefined` plugin target defaults to
      Web. Explicit `null` and every other invalid plugin-level target leave
      every call at runtime instead of silently falling back to Web output.

  - title: "Toolchain Boundary"
    content: |
      The Vite entry owns Vite's pre-transform path. The Babel entry runs only
      in toolchains configured to execute Babel plugins, including Metro. A
      Next.js project that remains on its default SWC pipeline does not execute
      this Babel plugin; using it requires an explicit Babel configuration and
      accepts Next.js's documented compiler trade-off. Vite filters the module
      pathname before query/hash suffixes, then sends every included module to
      parser authority without a raw identifier prefilter. Parser-valid escaped
      aliases and whitespace, comment, or newline-separated calls therefore
      share the same admission path.
