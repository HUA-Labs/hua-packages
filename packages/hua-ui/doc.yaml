overview: "Accessible, TypeScript-first component library for React applications. Provides 70+ production-ready components with modular entry points for optimal bundle size, dark mode support, and cross-platform styling via the dot style engine."

features:
  - "70+ components — Buttons, forms, tables, modals, overlays, and more"
  - "Modular entry points — Import only what you need for optimal bundle size"
  - "Accessible — ARIA attributes, keyboard navigation, WCAG compliant"
  - "Dark mode — Built-in dark mode support"
  - "dot style engine — Cross-platform styling (Web CSSProperties / React Native StyleSheet) via dot prop"
  - "Tree-shakeable — Side-effect free (except CSS)"

quickStart: |
  import { Button, Card, CardHeader, CardTitle, CardContent } from '@hua-labs/ui';
  import { Input, Select } from '@hua-labs/ui/form';

  function App() {
    return (
      <Card>
        <CardHeader>
          <CardTitle>Sign Up</CardTitle>
        </CardHeader>
        <CardContent>
          <Input placeholder="Email" />
          <Button>Submit</Button>
        </CardContent>
      </Card>
    );
  }

related:
  - "hua"

subpathExports:
  - path: "form"
    description: "Form components (Input, Select, DatePicker, Upload, etc.)"
  - path: "icons"
    description: "Icon components"
  - path: "chart"
    description: "Chart components"
  - path: "data-display"
    description: "Data display components (Table, Timeline, etc.)"
  - path: "overlay"
    description: "Overlay components (Modal, Drawer, Popover, etc.)"
  - path: "feedback"
    description: "Feedback components (Toast, Alert, etc.)"

apiFilter: notes-only

apiNotes:
  # Core components
  Button:
    description: "Primary action button with variants, sizes, and loading state"
    kind: "component"
  Action:
    description: "Compact icon action button"
    kind: "component"
  Input:
    description: "Text input with validation, prefix/suffix, and error states"
    kind: "component"
  NumberInput:
    description: "Numeric input with increment/decrement controls"
    kind: "component"
  Label:
    description: "Form label with required indicator"
    kind: "component"
  Switch:
    description: "Toggle switch for boolean values"
    kind: "component"
  Toggle:
    description: "Pressable toggle button"
    kind: "component"
  Link:
    description: "Styled anchor with router integration"
    kind: "component"
  Icon:
    description: "Universal icon component (Lucide, Phosphor, custom)"
    kind: "component"
  Avatar:
    description: "User avatar with image fallback"
    kind: "component"
  Badge:
    description: "Status badge with color variants"
    kind: "component"

  # Layout
  Card:
    description: "Content container with header, body, footer slots"
    kind: "component"
  Container:
    description: "Responsive max-width container"
    kind: "component"
  Grid:
    description: "CSS Grid layout wrapper"
    kind: "component"
  Stack:
    description: "Flex stack layout (vertical/horizontal)"
    kind: "component"
  Divider:
    description: "Visual separator (horizontal/vertical)"
    kind: "component"
  Panel:
    description: "Collapsible content panel"
    kind: "component"
  ScrollArea:
    description: "Custom scrollbar container"
    kind: "component"

  # Overlay
  Modal:
    description: "Dialog overlay with backdrop and focus trap"
    kind: "component"
  Tooltip:
    description: "Hover tooltip with positioning"
    kind: "component"

  # Feedback
  Alert:
    description: "Inline alert with success/warning/error/info variants"
    kind: "component"
  ToastProvider:
    description: "Toast notification provider"
    kind: "component"
  useToast:
    description: "Imperative toast API — toast.success(), toast.error()"
    kind: "hook"
  LoadingSpinner:
    description: "Animated loading indicator"
    kind: "component"
  Progress:
    description: "Progress bar with percentage"
    kind: "component"
  Skeleton:
    description: "Content placeholder during loading"
    kind: "component"

  # Theme
  ThemeProvider:
    description: "Dark/light theme context provider"
    kind: "component"
  ThemeToggle:
    description: "Theme switch button"
    kind: "component"
  useTheme:
    description: "Theme context hook — { theme, setTheme }"
    kind: "hook"

  # Layout (additional)
  Section:
    description: "Page section wrapper with optional header config (title, description, action)"
    kind: "component"
  ActionToolbar:
    description: "Horizontal toolbar that renders a list of icon action buttons"
    kind: "component"
  ComponentLayout:
    description: "Dev/docs layout that renders a component with labelled preview and code slots"
    kind: "component"
  Prose:
    description: "Typography wrapper that applies readable prose styles to raw HTML/markdown content"
    kind: "component"

  # Primitives (cross-platform)
  Box:
    description: "Base block primitive (renders as <div> on web, View on native via .native.tsx)"
    kind: "component"
  Text:
    description: "Base text primitive (renders as <span> on web, Text on native via .native.tsx)"
    kind: "component"
  Pressable:
    description: "Interactive primitive with hover/focus dot styles (renders as <button> on web)"
    kind: "component"

  # Utilities
  cn:
    description: "Class name merging utility (clsx + tailwind-merge). Legacy — prefer dot prop for new code"
    kind: "function"
  Slot:
    description: "Polymorphic slot for asChild pattern"
    kind: "component"
  IconProvider:
    description: "Icon configuration context provider"
    kind: "component"
  ScrollToTop:
    description: "Scroll-to-top floating button"
    kind: "component"

  # Style utilities
  merge:
    description: "Merge multiple class strings, filtering falsy values"
    kind: "function"
  mergeIf:
    description: "Conditionally append a class string based on a boolean flag"
    kind: "function"
  mergeMap:
    description: "Map over an object of conditional classes and merge the truthy ones"
    kind: "function"
  formatRelativeTime:
    description: "Format a Date as a human-readable relative time string (e.g. '3 minutes ago')"
    kind: "function"
  composeRefs:
    description: "Compose multiple React refs into a single callback ref"
    kind: "function"
  mergeProps:
    description: "Merge two sets of React props, combining event handlers and class names"
    kind: "function"
  createColorStyles:
    description: "Generate Tailwind color class strings from a ColorStyleConfig"
    kind: "function"
  useColorStyles:
    description: "Hook that returns memoised color class strings from a ColorStyleConfig"
    kind: "hook"

  # Variant / style factory utilities
  createVariantStyles:
    description: "Build a variant→class-string map for a component (e.g. solid, outline, ghost)"
    kind: "function"
  createSizeStyles:
    description: "Build a size→class-string map (xs, sm, md, lg, xl)"
    kind: "function"
  createRoundedStyles:
    description: "Build a rounded→class-string map (none, sm, md, lg, full)"
    kind: "function"
  createShadowStyles:
    description: "Build a shadow level→class-string map"
    kind: "function"
  createHoverStyles:
    description: "Build hover effect→class-string map (scale, brightness, opacity, etc.)"
    kind: "function"

  # Motion config context
  MotionConfigProvider:
    description: "Context provider for per-component motion configuration overrides"
    kind: "component"
  useMotionConfig:
    description: "Read the current MotionConfigContext value"
    kind: "hook"
  useComponentMotion:
    description: "Resolve the merged motion config for a specific component name"
    kind: "hook"
  HUA_SPRING_EASING:
    description: "CSS cubic-bezier string for the HUA brand spring easing"
    kind: "variable"
  withDarkMode:
    description: "Wrap a class string with a dark: variant equivalent"
    kind: "function"

  # Color utilities
  createGradient:
    description: "Generate a Tailwind gradient class string from from/via/to color stops"
    kind: "function"
  withOpacity:
    description: "Append a Tailwind opacity modifier to a color class (e.g. bg-primary/50)"
    kind: "function"
  isTextWhite:
    description: "Return true if a given color variant requires white text for contrast"
    kind: "function"
  isGradientVariant:
    description: "Type-guard that checks whether a color value is a gradient variant string"
    kind: "function"

  # Responsive / conditional class utilities
  responsive:
    description: "Apply breakpoint prefixes to a class string (sm:, md:, lg:, etc.)"
    kind: "function"
  conditionalClass:
    description: "Return a class string only when a condition is true, otherwise empty string"
    kind: "function"

  # Micro motion system
  useMicroMotion:
    description: "Hook that returns CSS class strings for micro-interaction motion states"
    kind: "hook"
  getMicroMotionClasses:
    description: "Pure function that resolves micro-motion class strings from a config without a hook"
    kind: "function"
  EASING_FUNCTIONS:
    description: "Map of named CSS cubic-bezier easing strings used by micro motion"
    kind: "variable"
  DURATIONS:
    description: "Map of semantic duration tokens (fast, normal, slow, etc.) in milliseconds"
    kind: "variable"
  COMPONENT_MOTION_DEFAULTS:
    description: "Default micro-motion configs keyed by component name"
    kind: "variable"

  # Icon utilities
  iconNames:
    description: "Complete list of all icon name strings available in the project"
    kind: "variable"
  iconProviderMapping:
    description: "Map from icon name to its provider (lucide, phosphor, custom, etc.)"
    kind: "variable"
  isValidIconName:
    description: "Type-guard that checks whether a string is a valid icon name"
    kind: "function"
  getIconNameForProvider:
    description: "Resolve the provider-specific icon identifier for a given icon name"
    kind: "function"
  ICON_ALIASES:
    description: "Map of alias strings to canonical icon names"
    kind: "variable"
  resolveIconAlias:
    description: "Resolve an alias to its canonical icon name, returning the input unchanged if not an alias"
    kind: "function"
  getIconAliases:
    description: "Return the list of all registered icon alias strings"
    kind: "function"
  registerLucideResolver:
    description: "Register the Lucide icon resolver so the Icon component can render Lucide icons"
    kind: "function"

  # Advanced hooks
  useAnimatedEntrance:
    description: "Trigger a CSS class-based entrance animation when an element enters the viewport"
    kind: "hook"
  useBreakpoint:
    description: "Track the current responsive breakpoint (sm / md / lg / xl / 2xl)"
    kind: "hook"
  useDotEnv:
    description: "Read dot-engine style tokens from a CSS custom-property environment"
    kind: "hook"
  useDotMap:
    description: "Resolve a DotStyleMap (state→dot-string) to live style objects based on current state"
    kind: "hook"
  mergeStyles:
    description: "Merge two CSSProperties / style objects, with the second taking precedence"
    kind: "function"
  resolveDot:
    description: "Resolve a dot-style string to a CSSProperties object at runtime"
    kind: "function"
