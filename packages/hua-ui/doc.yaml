    importFrom: "@hua-labs/ui/sdui/validation"
  validateSDUIPageSchemaV1WithMotionCore:
    description: "Validate a published SDUI V1 page envelope using the package-owned @hua-labs/motion-core projection catalog without executing renderer or animation runtime code"
