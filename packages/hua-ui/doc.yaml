overview: "Platform workspace authority for all 37 package entries in the accessible, TypeScript-first React component library. The public 2.4 core candidate is a separate source-ready projection with exactly 27 retained entries and 10 explicitly deferred entries."

features:
  - "70+ components — Buttons, forms, tables, modals, overlays, and more"
  - "Modular entry points — Import only what you need for optimal bundle size"
  - "Accessibility foundations — component-specific ARIA and keyboard contracts; browser and physical assistive-technology evidence remain separate"
  - "Dark mode — Built-in dark mode support"
  - "dot style engine — Cross-platform styling (Web CSSProperties / React Native StyleSheet) via dot prop"
  - "Modular ESM entries — CSS assets and provider-registration entries declare their side effects explicitly"
  - "Public 2.4 core candidate (source-ready only) retains exactly 27 package entries: @hua-labs/ui, @hua-labs/ui/advanced, @hua-labs/ui/advanced/dashboard, @hua-labs/ui/advanced/emotion, @hua-labs/ui/advanced/motion, @hua-labs/ui/data, @hua-labs/ui/feedback, @hua-labs/ui/form, @hua-labs/ui/icons, @hua-labs/ui/icons-bold, @hua-labs/ui/iconsax, @hua-labs/ui/iconsax-extended, @hua-labs/ui/interactive, @hua-labs/ui/interactive/kanban, @hua-labs/ui/landing, @hua-labs/ui/native, @hua-labs/ui/navigation, @hua-labs/ui/overlay, @hua-labs/ui/sdui, @hua-labs/ui/styles/base.css, @hua-labs/ui/styles/codeblock.css, @hua-labs/ui/styles/landing.css, @hua-labs/ui/styles/prose.css, @hua-labs/ui/styles/recommended-theme.css, @hua-labs/ui/styles/toast.css, @hua-labs/ui/styles/utilities.css, @hua-labs/ui/theme."
  - "Public 2.4 core candidate defers exactly 10 package entries and they are unavailable: @hua-labs/ui/ax, @hua-labs/ui/layout, @hua-labs/ui/lucide, @hua-labs/ui/motion, @hua-labs/ui/primitives, @hua-labs/ui/sdui/manifest, @hua-labs/ui/sdui/motion-core-validation, @hua-labs/ui/sdui/validation, @hua-labs/ui/theme/foundation, @hua-labs/ui/utils."
  - "Source-ready is not release-ready: final tarball, DTS, installed-consumer, version, release-plan, and npm authority remain unproven."

quickStart: |
  import { Button, Card, CardHeader, CardTitle, CardContent } from '@hua-labs/ui';
  import { Input, Select } from '@hua-labs/ui/form';

  function App() {
    return (
      <Card>
        <CardHeader>
          <CardTitle>Sign Up</CardTitle>
        </CardHeader>
        <CardContent>
          <Input placeholder="Email" />
          <Button>Submit</Button>
        </CardContent>
      </Card>
    );
  }

detailedGuide:
  path: "./DETAILED_GUIDE.md"
  distribution: "packed"
  description: "Full workspace usage plus the exact source-ready public 2.4 core-candidate boundary"

related:
  - "dot"
  - "motion-core"

apiFilter: notes-only

apiNotes:
  # Core components
  Button:
    description: "Primary action button with variants, sizes, and loading state"
    kind: "component"
  Action:
    description: "Compact icon action button"
    kind: "component"
  Input:
    description: "Text input with validation, prefix/suffix, and error states"
    kind: "component"
  NumberInput:
    description: "Numeric input with increment/decrement controls"
    kind: "component"
  Label:
    description: "Form label with required indicator"
    kind: "component"
  Switch:
    description: "Toggle switch for boolean values"
    kind: "component"
  Toggle:
    description: "Pressable toggle button"
    kind: "component"
  Link:
    description: "Styled anchor with router integration"
    kind: "component"
  Icon:
    description: "Semantic icon component backed by the executable catalog; Phosphor is the default complete fallback, Lucide is a first-class optional alternative, and Iconsax is an opt-in product-style alternative"
    kind: "component"
  Avatar:
    description: "User avatar with image fallback"
    kind: "component"
  Badge:
    description: "Status badge with color variants"
    kind: "component"

  # Layout
  Card:
    description: "Content container with header, body, footer slots"
    kind: "component"
  Container:
    description: "Responsive max-width container"
    kind: "component"
  Grid:
    description: "CSS Grid layout wrapper"
    kind: "component"
  Stack:
    description: "Flex stack layout (vertical/horizontal)"
    kind: "component"
  Divider:
    description: "Visual separator (horizontal/vertical)"
    kind: "component"
  Panel:
    description: "Collapsible content panel"
    kind: "component"
  ScrollArea:
    description: "Custom scrollbar container"
    kind: "component"

  # Overlay
  Modal:
    description: "Dialog overlay with backdrop; package docs do not claim browser focus containment or assistive-technology conformance without separate evidence"
    kind: "component"
  BottomSheet:
    description: "Bottom overlay with role=dialog and consumer-owned accessible naming; does not claim aria-modal, focus containment/restoration, or background isolation"
    kind: "component"
  Drawer:
    description: "Directional overlay with role=dialog and consumer-owned accessible naming; does not claim aria-modal, focus containment/restoration, or background isolation"
    kind: "component"
  Tooltip:
    description: "ReactNode-compatible tooltip: one renderable element owns direct hover/focus/ref and visible-lifetime aria-describedby, while legacy text or grouped children use the existing wrapper and require consumer-provided focusability for keyboard exposure; SDUI still admits one non-empty string and owns one button trigger; browser and physical assistive-technology behavior remains unproven"
    kind: "component"

  # Feedback
  Alert:
    description: "Inline alert with success/warning/error/info variants"
    kind: "component"
  ToastProvider:
    description: "Toast provider with status/polite semantics for info and success, and alert/assertive semantics for warning and error; physical announcement behavior remains unproven"
    kind: "component"
  useToast:
    description: "Imperative toast API — toast.success(), toast.error()"
    kind: "hook"
  LoadingSpinner:
    description: "Animated loading indicator"
    kind: "component"
  Textarea:
    description: "Multiline input with Booleanish aria-invalid preservation; error state forces aria-invalid=true and invalid styling"
    kind: "component"
  Progress:
    description: "Progress bar with percentage"
    kind: "component"
  Skeleton:
    description: "Content placeholder during loading"
    kind: "component"

  # Theme
  ThemeProvider:
    description: "Dark/light theme context provider"
    kind: "component"
  ThemeToggle:
    description: "Theme switch button"
    kind: "component"
  useTheme:
    description: "Theme context hook — { theme, setTheme }"
    kind: "hook"
  getDefaultThemeFoundationPreview:
    description: "Return the server-safe preview theme foundation metadata without importing ThemeProvider or renderer code"
    kind: "function"
    importFrom: "@hua-labs/ui/theme/foundation"
  getThemeFoundationCssVars:
    description: "Return light or dark preview CSS variable maps for current semantic theme tokens"
    kind: "function"
    importFrom: "@hua-labs/ui/theme/foundation"
  stringifyThemeFoundationCssVars:
    description: "Serialize a preview theme foundation CSS variable map under a selector"
    kind: "function"
    importFrom: "@hua-labs/ui/theme/foundation"
  getThemeFoundationDotConfigSeed:
    description: "Return a preview @hua-labs/dot config seed for semantic CSS variable color tokens"
    kind: "function"
    importFrom: "@hua-labs/ui/theme/foundation"
  UIThemeFoundationPreview:
    description: "Server-safe preview type for theme foundation metadata, presets, CSS vars, and dot config seed"
    kind: "type"
    importFrom: "@hua-labs/ui/theme/foundation"

  # Package AX
  getUiAxCatalog:
    description: "Return the frozen server-safe catalog derived from the UI package export map and semantic public-subpath manifest"
    kind: "function"
    importFrom: "@hua-labs/ui/ax"

  # Layout (additional)
  Section:
    description: "Page section wrapper with optional header config (title, description, action)"
    kind: "component"
  ActionToolbar:
    description: "Horizontal toolbar that renders a list of icon action buttons"
    kind: "component"
  ComponentLayout:
    description: "Dev/docs layout that renders a component with labelled preview and code slots"
    kind: "component"
  Prose:
    description: "Typography wrapper that applies readable prose styles to raw HTML/markdown content"
    kind: "component"

  # Primitives (cross-platform)
  Box:
    description: "Base block primitive: div on web and View on React Native; native dot styles compose before the full consumer StyleProp"
    kind: "component"
  Text:
    description: "Base text primitive: span on web and Text on React Native; native dot line clamps map to numberOfLines and explicit props win"
    kind: "component"
  Pressable:
    description: "Interactive primitive for Web and React Native; Web keeps a removable 44px minimum below sm and natural sizing at sm and above while composing consumer events, refs, styles, and accessibility state"
    kind: "component"
  KanbanBoard:
    description: "Web Kanban route with optional dnd-kit peers, mouse/touch/keyboard sensors, detached canonical metadata snapshots, preview-only hover, one-drop transaction commits, WIP fail-closed behavior, terminal-safe click activation, and bounded sanitized announcements; browser, touch-device, live-region speech, and physical assistive-technology evidence remain separate"
