    kind: "function"
  composeRefs:
    description: "Compose multiple React refs into a single callback ref"
    kind: "function"
  mergeProps:
    description: "Merge two sets of React props, combining event handlers and class names"
    kind: "function"
  createColorStyles:
    description: "Generate Tailwind color class strings from a ColorStyleConfig"
    kind: "function"
  useColorStyles:
