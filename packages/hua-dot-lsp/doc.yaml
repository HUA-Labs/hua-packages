overview: "LSP server for the dot style engine — autocomplete, hover, and diagnostics for dot() utility strings in any editor."

features:
  - "Autocomplete — package-local, hand-maintained token suggestions plus bounded variant-prefix projections"
  - "Hover Preview — shows resolved CSS property values (e.g., p-4 → padding: 16px)"
  - "Diagnostics — flags unrecognized utilities and CSS-only variants as warnings on file open and change"
  - "Target Caveats — optional web/native/flutter diagnostics for dropped, approximated, and recipe-only output, annotated with package-owned AX family/category metadata"
  - "Pattern Detection — works inside dot(), dot='', dot={''}, and template literal forms"
  - "Completion boundary — the server returns at most 500 matching entries per request from its inlined catalog; it is not a generated or exhaustive Dot registry"

quickStart: |
  # Install globally or in your project
  npm install -g @hua-labs/dot-lsp

  # Run as stdio LSP server (used by editor extensions)
  dot-lsp --stdio

  # Configure your editor's LSP client to launch `dot-lsp --stdio`.
  # File-type association belongs to that client, not to this server.

codeBlockLang: "bash"

readme:
  features:
    - "stdio LSP server for dot utility completion, hover, and diagnostics"
    - "Recognizes dot() calls and dot= JSX attribute forms"
    - "Hand-maintained inlined completion catalog with a 500-result request cap"
    - "Optional web/native/flutter target caveat diagnostics"
    - "AX family/category metadata in target diagnostics"
  quickStart: |
    npm install -g @hua-labs/dot-lsp
    dot-lsp --stdio
  codeBlockLang: "bash"
  hideApi: true
  hideSections: true
  detailedGuide: "./DETAILED_GUIDE.md"

related:
  - "dot"
  - "dot-mcp"

apiFilter: "notes-only"

apiNotes:
  dot-lsp:
    description: "CLI binary — starts the LSP server via stdio transport. Provides completion, hover, and diagnostic capabilities for dot utility strings."
    kind: "variable"

sections:
  - title: "Package Surface"
    content: |
      `@hua-labs/dot-lsp` is installed and executed as a CLI/LSP server package.
      Its public package surface is the `dot-lsp` binary, normally started with
      `dot-lsp --stdio` by an editor client, including a configured generic
      VS Code LSP client. The
      package does not publish a stable JavaScript import API or TypeScript type
      surface; editor integrations should treat the stdio LSP protocol as the
      contract. File types and process lifecycle are selected by the client.

  - title: "Target Configuration"
    content: |
      Clients may pass an optional target at initialization:

      ```json
      {
        "initializationOptions": {
          "dot": {
            "target": "native"
          }
        }
      }
      ```

      When no target is configured, diagnostics keep the default token-recognition
      behavior and do not emit target capability caveats.

      Target caveat messages are sourced from `dotExplain()` and annotated with
      `@hua-labs/dot` AX catalog family/category metadata, including composed
      family metadata for `ring` and class-mode `divide` markers. The metadata
      is diagnostic context only; it does not change resolver output, target
      adapters, VS Code behavior, or runtime support.

  - title: "Supported Patterns"
    content: |
      The LSP detects dot utility strings in these forms:

      ```tsx
      dot("p-4 flex items-center")
      dot('bg-primary-500')
      dot={`hover:bg-gray-100`}
      dot="p-4 rounded-lg"
      dot={'shadow-md'}
      ```

      CSS-only state, responsive, and pseudo variants may appear in completion,
      but inline `dot()` cannot apply them. The diagnostics provider emits a
      `Warning` directing those tokens to `dotClass()` or a `classDot` prop.

  - title: "Editor Integration"
    content: |
      - **VS Code**: Use a generic LSP client and follow that client's command, file-type, and initialization-options schema.
      - **Neovim**: Configure an LSP client with `cmd = {"dot-lsp", "--stdio"}`.
      - **Other editors**: Any compatible LSP client can spawn `dot-lsp --stdio`; the client owns file-type association.

      No first-party editor extension is part of this package release. Treat a
      separately distributed extension as a separate availability and support
      decision rather than inferring it from the `dot-lsp` package.
