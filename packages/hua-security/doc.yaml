    description: "Encrypt with best available method (KMS or PBKDF2)"
  decryptSmart:
    description: "Decrypt with auto-format detection"
  envelopeEncrypt:
    description: "Direct KMS envelope encryption"
  envelopeDecrypt:
    description: "Direct KMS envelope decryption"
  createMemoryRateLimiter:
