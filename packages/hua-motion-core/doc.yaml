overview: "A collection of 35+ React animation hooks built on a ref-based engine. Direct DOM manipulation for consistent performance with zero external dependencies. All hooks are TypeScript-native and SSR-compatible. React Native support via dedicated native hooks using the Animated API."
docsUrl: "https://docs.hua-labs.com"

features:
  - "35+ animation hooks — Fade, slide, scale, scroll, interactions, gestures"
  - "Zero dependencies — Pure JavaScript motion engine"
  - "Ref-based — Direct DOM manipulation for consistent performance"
  - "SSR compatible — Works with Next.js, Remix, and SSR frameworks"
  - "React Native — 10 native hooks via Animated API (separate entry point)"
  - "Fully tested — Comprehensive test coverage"

quickStart: |
  import { useFadeIn, useSlideUp } from '@hua-labs/motion-core';

  function Hero() {
    const fadeIn = useFadeIn({ duration: 800 });
    const slideUp = useSlideUp({ delay: 200 });

    return (
      <div>
        <h1 ref={fadeIn.ref} style={fadeIn.style}>Welcome</h1>
        <p ref={slideUp.ref} style={slideUp.style}>Animated content</p>
      </div>
    );
  }

  // React Native — import from /native
  import { useFadeIn, useStagger } from '@hua-labs/motion-core/native';

  function ListItem() {
    const fadeIn = useFadeIn({ duration: 400 });
    return (
      <Animated.View style={fadeIn.style}>
        <Text>Hello</Text>
      </Animated.View>
    );
  }

related:
  - "hua"

subpathExports:
  - path: "native"
    description: "React Native hooks using Animated API (useFadeIn, useSlide*, useScaleIn, useBounceIn, useSpringMotion, usePulse, useStagger)"

apiFilter: notes-only

apiNotes:
  # Page-level motion
  useSimplePageMotion:
    description: "Simple fade+slide page entrance animation"
  usePageMotions:
    description: "Multi-element page entrance orchestration"
  useSmartMotion:
    description: "Adaptive motion based on device performance"
  useUnifiedMotion:
    description: "All-in-one motion hook with presets"

  # Entrance animations
  useFadeIn:
    description: "Fade-in animation hook"
  useSlideUp:
    description: "Slide-up entrance animation"
  useSlideDown:
    description: "Slide-down entrance animation"
  useSlideLeft:
    description: "Slide-left entrance animation"
  useSlideRight:
    description: "Slide-right entrance animation"
  useScaleIn:
    description: "Scale-in entrance animation"
  useBounceIn:
    description: "Bounce-in entrance animation"

  # Continuous animations
  usePulse:
    description: "Repeating pulse animation"
  useSpringMotion:
    description: "Spring physics animation"
  useGradient:
    description: "Animated gradient background"
  useRepeat:
    description: "Repeating animation with configurable count"
  useToggleMotion:
    description: "Toggle between two animation states"

  # Interaction hooks
  useHoverMotion:
    description: "Hover interaction animation"
  useClickToggle:
    description: "Click-triggered toggle animation"
  useFocusToggle:
    description: "Focus-triggered toggle animation"
  useGesture:
    description: "Multi-gesture handler (drag, swipe, pinch)"
  useGestureMotion:
    description: "Gesture-driven motion animation"

  # Scroll hooks
  useScrollReveal:
    description: "Scroll-triggered reveal animation"
  useScrollProgress:
    description: "Scroll position as 0-1 progress value"
  useInView:
    description: "IntersectionObserver-based visibility detection"

  # Utility hooks
  useMotionState:
    description: "Animation state tracking (idle, running, complete)"
  useMouse:
    description: "Mouse position tracking"
  useReducedMotion:
    description: "Detect prefers-reduced-motion setting"
  useWindowSize:
    description: "Responsive window size tracking"

  # Easing functions
  easeInOut:
    description: "Smooth ease-in-out curve"
    kind: "function"
  getEasing:
    description: "Get easing function by name"
    kind: "function"

  # React Native hooks (import from /native)
  useFadeIn (native):
    description: "Native fade-in using Animated.timing"
  useSlideUp (native):
    description: "Native slide-up using Animated.parallel"
  useSlideDown (native):
    description: "Native slide-down using Animated.parallel"
  useSlideLeft (native):
    description: "Native slide-left using Animated.parallel"
  useSlideRight (native):
    description: "Native slide-right using Animated.parallel"
  useScaleIn (native):
    description: "Native scale-in using Animated.parallel"
  useBounceIn (native):
    description: "Native bounce-in using Animated.spring"
  useSpringMotion (native):
    description: "Native generic spring animation with animateTo()"
  usePulse (native):
    description: "Native looping pulse using Animated.loop"
  useStagger (native):
    description: "Native staggered list animation using Animated.stagger"
