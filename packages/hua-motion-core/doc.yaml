overview: "React 19 motion hooks, motion profiles, easing and spring utilities, and a dedicated React Native entry point. Web and native surfaces are documented separately so consumers can verify the exact renderer contract they use."
docsUrl: "https://docs.hua-labs.com"

features:
  - "Web entrance hooks — Ref, style, lifecycle state, and explicit controls"
  - "Motion profiles — Neutral and expressive defaults with bounded overrides"
  - "Reduced-motion signal — Browser preference tracking for application policy"
  - "React Native entry — Animated-based hooks from the explicit /native route"
  - "TypeScript declarations — Root and native entry-point types ship with the package"
  - "Framework-neutral utilities — Motion engine, easing, and spring calculations"

quickStart: |
  import { useFadeIn } from '@hua-labs/motion-core';

  function Hero() {
    const fade = useFadeIn<HTMLDivElement>({
      autoStart: true,
      initialOpacity: 0,
      targetOpacity: 1,
      duration: 500,
    });

    return (
      <div ref={fade.ref} style={fade.style}>
        Welcome
      </div>
    );
  }

readme:
  detailedGuide: "./DETAILED_GUIDE.md"
  peerDependenciesNote: "Required peer: `react >=19.0.0`. Optional, target-specific peers: `react-dom >=19.0.0` for DOM integrations and `react-native >=0.73.0` for the `/native` entry."

subpathExports:
  - path: "native"
    description: "React Native Animated hooks and target-specific style return types"

apiFilter: notes-only

