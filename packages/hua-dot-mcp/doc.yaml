overview: "MCP (Model Context Protocol) server for the dot style engine — enables AI assistants to resolve, explain, complete, and validate dot utility strings."

features:
  - "dot_resolve — convert utility strings to style objects (web CSSProperties, RN StyleSheet, Flutter recipe)"
  - "dot_explain — resolve + capability report (dropped/approximated properties per target)"
  - "dot_complete — suggestions from a package-local completion catalog with category labels (prefix + substring matching)"
  - "dot_capabilities — query the package-owned AX capability catalog without resolving styles"
  - "dot_validate — check utility strings for unrecognized tokens"
  - "Cross-platform support — web, native (React Native), and flutter targets"

quickStart: |
  # Install and run as MCP server
  npm install -g @hua-labs/dot-mcp
  dot-mcp

  # Or use with npx
  npx @hua-labs/dot-mcp

  # Pin an exact published version in reproducible client configurations.

  # Claude Desktop config (~/.claude/claude_desktop_config.json):
  {
    "mcpServers": {
      "dot": {
        "command": "npx",
        "args": ["@hua-labs/dot-mcp"]
      }
    }
  }

codeBlockLang: "bash"

readme:
  features:
    - "stdio MCP server for resolving, explaining, completing, and validating dot utilities"
    - "Target-aware web, native, and Flutter style projections"
    - "Package-local completion suggestions kept distinct from resolver and capability truth"
    - "Capability catalog queries via dot_capabilities"
    - "CLI-first package surface through the dot-mcp binary"
  quickStart: |
    npm install -g @hua-labs/dot-mcp
    dot-mcp
  codeBlockLang: "bash"
  hideApi: true
  hideSections: true
  detailedGuide: "./DETAILED_GUIDE.md"

related:
  - "dot"
  - "dot-lsp"

apiFilter: "notes-only"

apiNotes:
  dot_resolve:
    description: "Resolve a dot utility string into a platform-specific style object. Params: input, target, dark, and breakpoint."
    kind: "function"
  dot_explain:
    description: "Resolve + return capability report showing dropped/approximated properties for the target platform."
    kind: "function"
  dot_complete:
    description: "Get suggestions from this package's local completion catalog. Params: partial (string), limit? (number, default 20). The catalog is not an exhaustive Dot token authority."
    kind: "function"
  dot_capabilities:
    description: "Query the package-owned dot AX capability catalog. Params: target?, category?, level?, family?, limit?, includeProperties?, includeExamples?, includeComposition?."
    kind: "function"
  dot_validate:
    description: "Validate a utility string — returns `{ valid, errors[], resolved_count }`."
    kind: "function"

sections:
  - title: "Package Surface"
    content: |
      `@hua-labs/dot-mcp` is installed and executed as a CLI/MCP server package.
      Its public package surface is the `dot-mcp` binary, which exposes MCP
      tools over stdio. The package does not publish a stable JavaScript import
      API or TypeScript type surface; tool contracts are documented as MCP
      runtime capabilities.

  - title: "Tool Examples"
    content: |
      **dot_resolve:**
      ```json
      { "input": "p-4 flex items-center bg-blue-500", "target": "web" }
      → { "padding": "16px", "display": "flex", "alignItems": "center", "backgroundColor": "#3b82f6" }
      ```

      **dot_explain (native target):**
      ```json
      { "input": "p-4 blur-md grid", "target": "native" }
      → { "styles": {...}, "report": { "_dropped": ["filter", "gridTemplateColumns"], "_capabilities": {...} } }
      ```

      **dot_validate:**
      ```json
      { "input": "p-4 bg-bogus flex" }
      → { "valid": false, "errors": ["Unrecognized or unsupported utility: \"bg-bogus\""], "resolved_count": 2 }
      ```

      **dot_capabilities:**
      ```json
      { "family": "ring", "includeComposition": true }
      → { "sourceExport": "getDotAxCatalog", "entries": [{ "id": "ring", "composition": { "kind": "finalized-style", ... } }] }
      ```

  - title: "Response Boundary"
    content: |
      Successful calls produced by the five package handlers place a
      JSON-stringified result in `content[0].text`. Handler failures and schema
      validation failures are MCP errors: their exact text and outer error
      envelope may be produced by this package or by the client/SDK boundary.
      Consumers must check the MCP error signal before parsing successful text
      as JSON and must not require every error string to begin with `Error:`.

      `dot_complete` uses a package-local, hand-maintained completion catalog.
      Use `dot_validate`, `dot_explain`, or `dot_capabilities` for resolver and
      capability evidence; completion output is not an exhaustive token SSOT.
