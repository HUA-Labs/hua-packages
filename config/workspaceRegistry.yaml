    path: "packages/hua-ui"
    kind: package
    tier: spine
    accessClass: public-oss
    lifecycle: grow
    release:
      mode: public-npm
    publicMirror:
      mode: include
    ci:
      build: true
      typeCheck: true
      test: true
      lint: true

