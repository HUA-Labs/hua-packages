version: 1
updated: 2026-03-08
purpose: >
  Canonical machine-readable registry for workspace packages and apps.
  CI targets, package status docs, visibility policy, and founder summaries
  should derive from this file instead of hard-coded lists.
  Public mirror policy should also be tracked here.
  The `ci.*` flags represent participation in the default PR CI pipeline,
  not merely whether a script exists.

defaults:
  ci:
    build: true
    typeCheck: true
    test: false
    lint: false
  release:
    mode: no-publish
  publicMirror:
    mode: defer
  lifecycle: maintain

entries:
