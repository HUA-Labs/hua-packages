  - "dot() — utility string → CSSProperties (or RN StyleSheet / FlutterRecipe via adapter)"
  - "Broad utility coverage — spacing, colors, typography, layout, sizing, border, flexbox, z-index, shadow, opacity, transform, transition, animation, backdrop, positioning, grid, ring, filter, interactivity, line-clamp, mix-blend, gradient, object-fit, float, table, list, scroll, touch-action, will-change, word-break, isolation, bg-clip, font-smoothing, divide"
